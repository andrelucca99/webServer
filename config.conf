server {
    listen 8080;
    host 127.0.0.1;
    root ./www;
    client_max_body_size 1M;
    error_page 404 /errors/404.html;
    error_page 403 /errors/403.html;
    error_page 413 /errors/413.html;

    location / {
        methods GET POST DELETE;
        index index.html;
        autoindex on;
    }
}

server {
    listen 8081;
    host 127.0.0.1;
    root ./www;
    client_max_body_size 512K;

    location / {
        methods GET;
        index index.html;
        autoindex on;
    }
}
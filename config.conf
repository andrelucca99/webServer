server {
    listen 8080;
    host 127.0.0.1;
    root ./www;

    location / {
        methods GET POST DELETE;
        index index.html;
        autoindex on;
    }
}

server {
    listen 8081;
    host 127.0.0.1;
    root ./www;

    location / {
        methods GET;
        index index.html;
        autoindex on;
    }
}